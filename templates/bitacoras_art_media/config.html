{% extends "base.html" %}

{% block title %}Configuración Bitácoras Art. Media{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="mb-4">
        <h2>Configuración por Defecto</h2>
        <p class="text-muted">Establezca los valores predeterminados para el Ente Co-formador (SENA) que aparecerán al crear nuevas bitácoras.</p>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('bitacoras_art_media.configuracion') }}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Ente Co-formador</label>
                            <input type="text" class="form-control" name="entidad_nombre" value="{{ config.get('entidad_nombre', '') }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">NIT de la Entidad</label>
                            <input type="text" class="form-control" name="entidad_nit" value="{{ config.get('entidad_nit', '') }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Dirección de la Entidad</label>
                            <input type="text" class="form-control" name="entidad_direccion" value="{{ config.get('entidad_direccion', '') }}" required>
                        </div>
                        <div class="d-flex justify-content-end mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-save me-1"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
