<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title">Actividades (Hasta 5 filas base)</h5>
        <div class="table-responsive">
            <table class="table table-bordered" id="actividades-table">
                <thead>
                    <tr>
                        <th>Descripción</th>
                        <th>Competencias</th>
                        <th>F. Inicio</th>
                        <th>F. Fin</th>
                        <th>Evidencia</th>
                        <th>Observaciones</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="actividades-body">
                    <!-- JS rellena esto con 5 filas vacías -->
                </tbody>
            </table>
        </div>
        <button type="button" class="btn btn-outline-secondary" id="btn-add-actividad">+ Agregar Fila</button>
    </div>
</div>
