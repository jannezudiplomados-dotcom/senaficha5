<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h5 class="card-title">Ente Co-formador</h5>
        <div class="row mb-3">
            <div class="col-md-12">
                <label class="form-label">Nombre de Entidad</label>
                <input type="text" class="form-control" name="entidad_nombre" id="entidad_nombre" required>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">NIT</label>
                <input type="text" class="form-control" name="entidad_nit" id="entidad_nit" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Dirección</label>
                <input type="text" class="form-control" name="entidad_direccion" id="entidad_direccion" required>
            </div>
        </div>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <h5 class="card-title">Instructor Responsable</h5>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" name="jefe_nombre" id="jefe_nombre" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Cargo</label>
                <input type="text" class="form-control" name="jefe_cargo" id="jefe_cargo" value="Instructor" required>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Teléfono</label>
                <input type="text" class="form-control" name="jefe_telefono" id="jefe_telefono" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" name="jefe_correo" id="jefe_correo" required>
            </div>
        </div>
    </div>
</div>
