{% extends 'base.html' %}
{% block title %}Administradores{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Administradores</h3>
  <a href="{{ url_for('admins.nuevo') }}" class="btn btn-success"><i class="bi bi-plus-lg"></i> Nuevo</a>
</div>
<div class="card"><div class="table-responsive">
<table class="table table-hover mb-0 align-middle">
<thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Activo</th><th></th></tr></thead>
<tbody>
{% for a in admins %}
<tr>
  <td>{{ a.username }}</td><td>{{ a.nombre }}</td>
  <td><span class="badge bg-{{ 'danger' if a.rol=='superadmin' else 'secondary' }}">{{ a.rol }}</span></td>
  <td>{{ 'Si' if a.activo else 'No' }}</td>
  <td class="text-end text-nowrap">
    <a href="{{ url_for('admins.editar', aid=a.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
    <form method="post" action="{{ url_for('admins.eliminar', aid=a.id) }}" class="d-inline" onsubmit="return confirm('Eliminar administrador?');">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
    </form>
  </td>
</tr>
{% endfor %}
</tbody></table></div></div>
{% endblock %}
