<!-- Overlay modal (oculto por defecto) -->
<div id="sigda-overlay" class="d-none" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="text-center bg-white p-4 rounded-4 shadow-lg" style="min-width: 320px; max-width: 90%;">
        <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem; border-width: 0.35em;">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <h4 class="mt-4 mb-2 text-dark fw-bold" id="sigda-overlay-text">Generando documentos...</h4>
        <p class="text-muted mb-0" id="sigda-overlay-subtext">Por favor espera un momento.</p>
        <div class="mt-3 py-2 px-3 bg-light rounded-3 d-inline-block border">
            <i class="bi bi-stopwatch text-secondary me-2"></i>
            <span id="sigda-overlay-timer" class="fw-bold fs-5 font-monospace text-dark">00:00</span>
        </div>
    </div>
</div>
