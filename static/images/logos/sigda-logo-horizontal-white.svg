<svg width="720" height="180" viewBox="0 0 720 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B9CEB"/>
      <stop offset="100%" stop-color="#1E6ABF"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="48" y1="52" x2="72" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#56C285"/>
      <stop offset="100%" stop-color="#348A52"/>
    </linearGradient>
    <filter id="iconShadow" x="-15%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ÍCONO -->
  <g transform="translate(20 42)" filter="url(#iconShadow)">
    <rect x="4" y="4" width="88" height="88" rx="22" fill="url(#bgGrad)"/>
    <ellipse cx="30" cy="25" rx="30" ry="22" fill="white" opacity="0.08"/>
    <path d="M34 24 h20 l14 14 v34 a4 4 0 0 1 -4 4 H34 a4 4 0 0 1 -4 -4 V28 a4 4 0 0 1 4 -4 Z" fill="#FFFFFF"/>
    <path d="M54 24 v10 a4 4 0 0 0 4 4 h10 Z" fill="#D6EAFC"/>
    <rect x="38" y="44" width="18" height="3" rx="1.5" fill="#2783DE" opacity="0.9"/>
    <rect x="38" y="51" width="14" height="3" rx="1.5" fill="#B0D4F1" opacity="0.8"/>
    <rect x="38" y="58" width="10" height="3" rx="1.5" fill="#B0D4F1" opacity="0.5"/>
    <circle cx="62" cy="66" r="13" fill="url(#checkGrad)"/>
    <path d="M56.5 66 l3.8 3.8 L68 62" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- TEXTO BLANCO (para fondos oscuros) -->
  <text x="140" y="85" font-family="'Segoe UI', 'Inter', Arial, Helvetica, sans-serif" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="#FFFFFF">SIG</tspan><tspan fill="#6DB8F2">DA</tspan>
  </text>
  <text x="142" y="115" font-family="'Segoe UI', 'Inter', Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.65)" letter-spacing="0.3">
    Sistema Integrado de Gestión Documental de Articulación y Media Técnica
  </text>
  <rect x="142" y="125" width="60" height="3" rx="1.5" fill="#6DB8F2" opacity="0.5"/>
</svg>
